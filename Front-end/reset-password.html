<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Redefinição de senha da área privativa ASSOFIG.">
  <meta name="theme-color" content="#0876aa">
  <title>Redefinir senha | ASSOFIG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/reset-password.css">
</head>
<body class="reset-password-page">
  <main class="reset-password-main">
    <section class="reset-password-card" aria-labelledby="reset-password-title">
      <a class="reset-password-brand" href="/" aria-label="Voltar para a página inicial da ASSOFIG">
        <img src="img/assofig.jpg" alt="">
        <span><strong>ASSOFIG</strong><small>Área privativa</small></span>
      </a>
      <span class="eyebrow">Recuperação de acesso</span>
      <h1 id="reset-password-title">Defina sua nova senha</h1>
      <p class="reset-password-intro">Use pelo menos 6 caracteres e confirme a mesma senha abaixo.</p>

      <div class="reset-password-message" id="reset-password-message" role="alert" aria-live="polite" hidden></div>

      <form id="reset-password-form" novalidate>
        <label for="reset-password">Nova senha</label>
        <div class="reset-password-field">
          <input id="reset-password" name="password" type="password" minlength="6" maxlength="200" autocomplete="new-password" required>
          <button type="button" data-toggle-password="reset-password" aria-label="Exibir nova senha">Exibir</button>
        </div>

        <label for="reset-password-confirmation">Confirme a nova senha</label>
        <div class="reset-password-field">
          <input id="reset-password-confirmation" name="passwordConfirmation" type="password" minlength="6" maxlength="200" autocomplete="new-password" required>
          <button type="button" data-toggle-password="reset-password-confirmation" aria-label="Exibir confirmação da senha">Exibir</button>
        </div>

        <button class="btn btn-blue full" type="submit">Redefinir senha</button>
      </form>

      <div class="reset-password-success" id="reset-password-success" role="status" hidden>
        <strong>Senha redefinida com sucesso.</strong>
        <p>Agora você já pode acessar a área privativa com a nova senha.</p>
        <a class="btn btn-blue full" href="/">Voltar ao site e entrar</a>
      </div>

      <a class="reset-password-back" href="/">← Voltar para o site</a>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
